name: Deploy Next.js site to GitHub Pages

on:
  # main 브랜치에 push될 때마다 실행
  push:
    branches: [main]
  # GitHub 웹의 Actions 탭에서 수동 실행도 가능하게
  workflow_dispatch:

# 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 배포가 겹치면 이전 것을 기다리도록
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 1단계: 빌드
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 소스 코드 가져오기
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 빌드 (out/ 폴더 생성)
        run: npm run build

      - name: 빌드 결과물 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # 2단계: 배포
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pages에 배포
        id: deployment
        uses: actions/deploy-pages@v4
